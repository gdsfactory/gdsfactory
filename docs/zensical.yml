site_name: GDSFactory
repo_url: https://github.com/gdsfactory/gdsfactory
site_url: https://gdsfactory.github.io/gdsfactory
site_dir: _build/html

nav:
  - Home: index.md
  - Introduction:
      - Getting Started:
          - getting_started.md
          - developer.md
          - notebooks/_2_klayout.md
          - notebooks/_0_python.md
          - notebooks/_1_git.md
          - workflow.md
          - notebooks/12_config.md
      - Layout:
          - layout.md
          - notebooks/00_geometry.md
          - notebooks/01_references.md
          - notebooks/03_cells_autoname_and_cache.md
          - notebooks/03_Path_CrossSection.md
          - notebooks/04_components_shapes.md
          - notebooks/04_components_geometry.md
          - notebooks/04_components_hierarchy.md
          - notebooks/04_components_pack.md
          - notebooks/04_routing.md
          - notebooks/04_routing_electrical.md
          - notebooks/07_mask.md
          - notebooks/11_best_practices.md
          - notebooks/12_grid_snapping.md
      - Schematic:
          - schematic.md
          - notebooks/10_schematic.md
          - notebooks/10_yaml_component.md
      - PDK:
          - pdk.md
          - notebooks/08_pdk.md
          - notebooks/03_layer_stack.md
          - notebooks/09_pdk_import.md
      - Migration:
          - migration.md
          - notebooks/21_migration_guide_7_8.md
          - notebooks/22_migration_8.md
  - Plugins: https://gdsfactory.github.io/gplugins/
  - Reference:
      - API: api.md
      - Routing API: api_routing.md
      - PCells: components.md
      - Contributing: contributing.md
      - Changelog: changelog.md
      - Training: https://gdsfactory.github.io/gdsfactory-photonics-training/index.html
      - Website: https://gdsfactory.com

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path: ["..", "docs"]
      check_paths: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      enabled: true
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            members_order: alphabetical
            show_root_heading: true
            show_root_full_path: false
  - autorefs
